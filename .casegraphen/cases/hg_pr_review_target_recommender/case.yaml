description: 'Design and implement a HigherGraphen-powered tool that lets an AI analyze PR code changes and propose the files, symbols, and structural risks a human reviewer should inspect. Done means the workflow emits a stable JSON report with review targets, evidence, confidence, unreviewed AI proposals, human-facing projection, and verification coverage. Out of scope for the first case: automatic PR approval, silent promotion of AI inferences, and provider-specific GitHub comment automation unless added by a later case.'
