case_id: hg_pr_review_git_input_adapter
title: PR review git input adapter
description: Implement a deterministic git-range adapter that converts commit history and diff metadata into highergraphen.pr_review_target.input.v1 JSON. Done means highergraphen can generate a bounded PR review target input document from local git refs without LLM inference, and the generated input can feed the existing pr-review targets recommend workflow.
